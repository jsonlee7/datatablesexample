name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: dotnet publish DatatablesBlazor.csproj -c Release -o publish

      - name: Set base href and copy 404.html
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          # Update base href for the sub-path GitHub Pages uses
          sed -i "s|<base href=\"/\"|<base href=\"/$REPO_NAME/\"|g" publish/wwwroot/index.html
          # Copy index.html to 404.html so deep-links resolve correctly
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          # Prevent Jekyll from ignoring files starting with _
          touch publish/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
